on:
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      # exclude integration tests (require external services) and amqp broker (not used)
      - run: go test $(go list ./... | grep -v integration-tests | grep -v brokers/amqp)
